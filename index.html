<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Left Leg Kickers</title>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0b0b;
color:white;
}
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('hero.jpg');
background-size:cover;
background-position:center;
padding:20px;
}
.logo{
max-width:180px;
margin-bottom:20px;
}
h1{
font-size:60px;
margin:10px 0;
letter-spacing:3px;
}
.tagline{
font-size:20px;
color:#ccc;
margin-bottom:30px;
}
.buttons a{
display:inline-block;
margin:10px;
padding:14px 26px;
border:1px solid white;
color:white;
text-decoration:none;
border-radius:6px;
transition:0.3s;
}
.buttons a:hover{
background:white;
color:black;
}
.section{
padding:60px 20px;
text-align:center;
}
.section h2{
font-size:32px;
margin-bottom:20px;
}
footer{
text-align:center;
padding:30px;
color:#777;
font-size:14px;
}
</style>
</head>
<body>
<div class="hero">
<img src="logo.png" class="logo" alt="Band Logo">
<h1>The Left Leg Kickers</h1>
<p class="tagline">Original Scottish Rock Band</p>
<div class="buttons">
<a href="https://instagram.com">Instagram</a>
<a href="https://tiktok.com">TikTok</a>
<a href="https://youtube.com">YouTube</a>
</div>
</div>
<div class="section">
<h2>About</h2>
<p>
A raw and powerful blend of Scottish rock energy with country influences. Built for loud stages, late nights, and unforgettable shows.
</p>
</div>
<div class="section">
<h2>Music</h2>
<p>New releases coming soon. Follow us for updates.</p>
</div>
<footer>
© The Left Leg Kickers
</footer>
</body>
</html>
